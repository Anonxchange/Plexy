<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <!-- Cloudflare Worker stamps the per-request CSP nonce onto this tag's `nonce`
         attribute at the edge. main.tsx reads it and calls setNonce() so that
         react-style-singleton (used by Radix Dialog, Dropdown, Popover, etc.)
         automatically carries the nonce on every <style> it injects at runtime. -->
    <meta property="csp-nonce" />
    <!-- Cloudflare Worker stamps the user's ISO country code (e.g. "US") here at the
         edge. Client code reads this via getCountryCode() in lib/geo.ts so no external
         IP-geolocation API call is needed in production. -->
    <meta name="cf-country" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Sets theme class before first paint so ThemeProvider has nothing to change,
         eliminating the full-document style recalculation on initial load.
         Inlined to avoid a blocking network round-trip for a 180-byte file. -->
    <script>try{var t=localStorage.getItem('pexly-theme');if(t==='dark'||t==='light')document.documentElement.classList.add(t);else document.documentElement.classList.add('light');}catch(e){}</script>
    <title>Pexly - Non-Custodial Decentralized Crypto Software</title>
    <meta name="description" content="Pexly is your all-in-one decentralized market. Swap crypto, earn yield through staking, buy gift cards, top up mobile credit, pay utility bills, shop with crypto, and explore blockchain data — all without giving up custody of your assets." />
    
    <!-- Supabase preconnect hints are injected here at build time by vite.config.ts
         when VITE_SUPABASE_URL is defined. No placeholder needed in source HTML. -->
    <!--SUPABASE_PRECONNECT-->
   <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Pexly - Non-Custodial Decentralized Crypto Software" />
    <meta property="og:description" content="Pexly is your all-in-one decentralized market. Swap crypto, stake for yield, buy gift cards, pay bills, shop, and explore the blockchain — all non-custodial. Your keys, your assets." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.pexly.app/" />
    <meta property="og:image" content="https://www.pexly.app/hero-bg.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Pexly - Non-Custodial Decentralized Crypto Software" />
    <meta property="og:site_name" content="Pexly" />
    <!-- Twitter / WhatsApp card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pexly - Non-Custodial Decentralized Crypto Software" />
    <meta name="twitter:description" content="Pexly is your all-in-one decentralized market. Swap crypto, stake for yield, buy gift cards, pay bills, shop, and explore the blockchain — all non-custodial. Your keys, your assets." />
    <meta name="twitter:image" content="https://www.pexly.app/hero-bg.webp" />
    <meta name="twitter:image:alt" content="Pexly - Non-Custodial Decentralized Crypto Software" />
    
    <!--
      LCP hero image preload — tells the browser to fetch the hero background
      before React even starts, eliminating the JS-render delay from LCP.
      Two hints mirror the two <picture> elements in hero-section.tsx:
        • mobile  (max-width: 1023px) — image fills 100vw
        • desktop (min-width: 1024px) — image fills ~50vw (right panel)
      imagesrcset/imagesizes must match the <source> in hero-section.tsx exactly
      so the browser picks the same variant for the preload as for the render.
    -->
    <link
      rel="preload"
      as="image"
      href="/hero-bg-640.webp"
      imagesrcset="/hero-bg-640.webp 640w, /hero-bg-1024.webp 1024w, /hero-bg.webp 1408w"
      imagesizes="100vw"
      media="(max-width: 1023px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="/hero-bg-1024.webp"
      imagesrcset="/hero-bg-640.webp 640w, /hero-bg-1024.webp 1024w, /hero-bg.webp 1408w"
      imagesizes="50vw"
      media="(min-width: 1024px)"
      fetchpriority="high"
    />
